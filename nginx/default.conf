upstream django_backend {
    server web:8000;
}

# HTTP
server {
    listen 80;
    server_name lectra-ai.duckdns.org;

    # Keep this available for Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name lectra-ai.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/lectra-ai.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lectra-ai.duckdns.org/privkey.pem;

    client_max_body_size 100M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://django_backend;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Django Channels / WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300;
        proxy_connect_timeout 60;
    }
}