services:

  web:
    build: .

    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db
      - redis
      - chroma

  db:
    image: postgres:17

    environment:
      POSTGRES_DB: lectra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest

    ports:
      - "8001:8000"

    volumes:
      - chroma_data:/data

  celery:
    build: .

    command: celery -A config worker -l info --pool=solo

    volumes:
      - .:/app

    depends_on:
      - redis
      - db
      - chroma

volumes:
  postgres_data:
  chroma_data: